name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Release Build
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: 📦 Install pub dependencies
        run: flutter pub get

      # FIXED: Changed to 'dart run' for Flutter 3.27 compatibility
      - name: ⚙️ Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔧 Generate Xcode config
        run: |
          flutter build ios --release --config-only --no-codesign \
            --build-number=${{ github.run_number }} \
            --build-name=1.1.${{ github.run_number }}

      - name: 🦕 Pod install
        run: cd ios && pod install --repo-update

      - name: 🔓 Patch Xcode signing
        run: |
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBX"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBX"
          
          echo "CODE_SIGNING_ALLOWED=NO"  >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig

      - name: 🏗️ Build iOS app
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -qq -r -9 BT-SecureChat.ipa Payload
          
      - name: 🚀 Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: BT-SecureChat.ipa
          asset_name: BT-SecureChat-v1.1.${{ github.run_number }}.ipa
          tag: v1.1.${{ github.run_number }}
          overwrite: true
